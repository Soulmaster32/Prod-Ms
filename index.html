<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>105&106_DeZn_MS_SR - AVEVA PI Vision Clone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="hmi-header">
        <div class="logo">AVEVA™ PI Vision™</div>
        <div class="display-name">105&106_DeZn_MS_SR</div>
    </div>

    <div class="hmi-container">
        <!-- LEFT SIDE: Real-Time Dark Charts -->
        <div class="left-panel">
            <div class="chart-wrapper"><canvas id="chartFlow"></canvas></div>
            <div class="chart-wrapper"><canvas id="chartH2S"></canvas></div>
            <div class="chart-wrapper"><canvas id="chartPressure"></canvas></div>
            <div class="chart-wrapper"><canvas id="chartLevel"></canvas></div>
        </div>

        <!-- RIGHT SIDE: Process Graphics (P&ID Canvas) -->
        <div class="right-panel">
            
            <!-- SVG Piping Layer -->
            <svg class="piping-layer" width="100%" height="100%">
                <!-- Main top horizontal pipe -->
                <line x1="100" y1="180" x2="650" y2="180" stroke="#00ffff" stroke-width="3" stroke-dasharray="5,5" />
                <!-- Vertical drops to reactors -->
                <line x1="150" y1="180" x2="150" y2="280" stroke="#00ffff" stroke-width="3" />
                <line x1="300" y1="180" x2="300" y2="280" stroke="#00ffff" stroke-width="3" />
                <line x1="450" y1="180" x2="450" y2="280" stroke="#00ffff" stroke-width="3" />
                <line x1="600" y1="180" x2="600" y2="280" stroke="#00ffff" stroke-width="3" />
            </svg>

            <!-- Bypassed overlay -->
            <div class="bypassed-badge">Bypassed</div>

            <!-- Reactors Array -->
            <div class="reactors-container">
                
                <!-- 106VE01 -->
                <div class="reactor-group">
                    <div class="motor">M</div>
                    <div class="tank">
                        <div class="shaft"></div><div class="blade blade-top"></div><div class="blade blade-bottom"></div>
                        <div class="liquid" id="liquid1"></div>
                        <div class="capacity">759m3</div>
                    </div>
                    <div class="equipment-name">106VE01</div>
                </div>

                <!-- 106VE02 -->
                <div class="reactor-group">
                    <div class="motor">M</div>
                    <div class="tank">
                        <div class="shaft"></div><div class="blade blade-top"></div><div class="blade blade-bottom"></div>
                        <div class="liquid" id="liquid2"></div>
                        <div class="capacity">759m3</div>
                    </div>
                    <div class="equipment-name">106VE02</div>
                </div>

                <!-- 106VE03 -->
                <div class="reactor-group">
                    <div class="motor">M</div>
                    <div class="tank">
                        <div class="shaft"></div><div class="blade blade-top"></div><div class="blade blade-bottom"></div>
                        <div class="liquid" id="liquid3"></div>
                        <div class="capacity">759m3</div>
                    </div>
                    <div class="equipment-name">106VE03</div>
                </div>

                <!-- 106VE04 -->
                <div class="reactor-group">
                    <div class="motor">M</div>
                    <div class="tank">
                        <div class="shaft"></div><div class="blade blade-top"></div><div class="blade blade-bottom"></div>
                        <div class="liquid" id="liquid4"></div>
                        <div class="capacity">759m3</div>
                    </div>
                    <div class="equipment-name">106VE04</div>
                </div>
            </div>

            <!-- PI Vision Tags -->
            <div class="pi-tag" style="top: 150px; left: 30px;">
                <div class="tag-name">106FIC002A</div>
                <div class="tag-value-row">
                    <div class="status-indicator" style="background:#0055ff;"></div>
                    <span class="tag-value" id="val_flow">0</span>
                    <span class="tag-unit">m3/h</span>
                </div>
            </div>

            <div class="pi-tag" style="top: 250px; left: 30px;">
                <div class="tag-name">106PI001</div>
                <div class="tag-value-row">
                    <div class="status-indicator" style="background:#00ff00;"></div>
                    <span class="tag-value" id="val_pressure">0</span>
                    <span class="tag-unit">kPag</span>
                </div>
            </div>

            <div class="pi-tag" style="top: 480px; left: 140px;">
                <div class="tag-name">106LIC003</div>
                <div class="tag-value-row">
                    <span class="tag-value" id="val_ve01">0</span>
                    <span class="tag-unit">%</span>
                </div>
            </div>

            <div class="pi-tag" style="top: 480px; left: 290px;">
                <div class="tag-name">106LIC004</div>
                <div class="tag-value-row">
                    <span class="tag-value" id="val_ve02">0</span>
                    <span class="tag-unit">%</span>
                </div>
            </div>
            
            <div class="pi-tag" style="top: 480px; left: 440px;">
                <div class="tag-name">106LIC005</div>
                <div class="tag-value-row">
                    <span class="tag-value" id="val_ve03">0</span>
                    <span class="tag-unit">%</span>
                </div>
            </div>

            <div class="pi-tag" style="top: 480px; left: 590px;">
                <div class="tag-name">106LIC006</div>
                <div class="tag-value-row">
                    <span class="tag-value" id="val_ve04">0</span>
                    <span class="tag-unit">%</span>
                </div>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
