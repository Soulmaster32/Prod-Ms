<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GB Connect</title>
<!-- Inline SVG Favicon to prevent 404 errors -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231877F2%22/><text x=%2250%22 y=%2270%22 font-family=%22Arial%22 font-size=%2265%22 font-weight=%22bold%22 fill=%22white%22 text-anchor=%22middle%22>G</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════ DESIGN SYSTEM ══════════ */
:root {
  --fb-blue: #1877F2;
  --fb-blue-hover: #166FE5;
  --fb-blue-light: rgba(24, 119, 242, 0.10);
  --fb-blue-mid: rgba(24, 119, 242, 0.18);
  --fb-green: #31A24C;
  --fb-red: #FA383E;
  --fb-yellow: #F5C518;
  --fb-purple: #9C27B0;

  --bg-app: #F0F2F5;
  --bg-surface: rgba(255, 255, 255, 0.95);
  --bg-surface-solid: #FFFFFF;
  --bg-hover: rgba(0,0,0,0.05);
  --bg-input: #F0F2F5;

  --text-main: #050505;
  --text-muted: #65676B;
  --text-link: var(--fb-blue);

  --border: rgba(0,0,0,0.10);
  --border-strong: rgba(0,0,0,0.15);
  --divider: #E4E6EB;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.10);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.12);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.14);
  --shadow-float: 0 8px 32px rgba(0,0,0,0.18);

  --navbar-h: 56px;
  --left-w: 360px;
  --right-w: 360px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-pill: 9999px;
  --radius-circle: 50%;

  --reaction-like: #1877F2;
  --reaction-love: #F33E58;
  --reaction-haha: #F7B125;
  --reaction-wow: #F7B125;
  --reaction-sad: #F7B125;
  --reaction-angry: #E9710F;
  color-scheme: light dark;
}

body.dark-mode {
  --bg-app: #18191A;
  --bg-surface: rgba(36, 37, 38, 0.95);
  --bg-surface-solid: #242526;
  --bg-hover: rgba(255,255,255,0.08);
  --bg-input: #3A3B3C;
  --text-main: #E4E6EB;
  --text-muted: #B0B3B8;
  --border: rgba(255,255,255,0.10);
  --border-strong: rgba(255,255,255,0.18);
  --divider: #3E4042;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.5);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-float: 0 8px 32px rgba(0,0,0,0.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Nunito', system-ui, -apple-system, sans-serif;
  background: var(--bg-app);
  color: var(--text-main);
  font-size: 15px;
  line-height: 1.5;
  overflow-y: scroll;
}
button, input, textarea, select { font-family: inherit; color: inherit; border: none; outline: none; }
button:focus-visible, a:focus-visible { outline: 2px solid var(--fb-blue); outline-offset: 2px; border-radius: 4px; }
a { text-decoration: none; color: inherit; }
img { max-width: 100%; display: block; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--divider); border-radius: var(--radius-pill); }

/* ══════════ UTILITIES ══════════ */
.surface { background: var(--bg-surface-solid); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
.avatar { border-radius: var(--radius-circle); object-fit: cover; display: block; }
.icon-circle {
  width: 40px; height: 40px; border-radius: var(--radius-circle);
  background: var(--bg-input); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.15s; flex-shrink: 0; font-size: 18px;
}
.icon-circle:hover { background: var(--divider); }
.btn { padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 700; font-size: 15px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.15s; border: none; }
.btn-primary { background: var(--fb-blue); color: #fff; }
.btn-primary:hover { background: var(--fb-blue-hover); }
.btn-secondary { background: var(--bg-input); color: var(--text-main); }
.btn-secondary:hover { background: var(--divider); }
.btn-ghost { background: transparent; color: var(--text-link); font-weight: 700; }
.btn-ghost:hover { background: var(--fb-blue-light); }
.btn-link { background: transparent; border: none; padding: 0; font: inherit; color: var(--fb-blue); font-weight: 700; cursor: pointer; display: inline; text-align: center; }
.btn-link:hover { text-decoration: underline; }
.badge { background: var(--fb-red); color: #fff; font-size: 11px; font-weight: 800; min-width: 18px; height: 18px; padding: 0 4px; border-radius: var(--radius-pill); display: inline-flex; align-items: center; justify-content: center; }
.chip { display: inline-flex; align-items: center; gap: 6px; background: var(--fb-blue-light); color: var(--fb-blue); border-radius: var(--radius-pill); padding: 6px 14px; font-weight: 700; font-size: 14px; }
.unstyled-btn { background: transparent; border: none; text-align: left; width: 100%; display: block; font: inherit; color: inherit; cursor: pointer; }

/* ══════════ FORM ELEMENTS ══════════ */
.form-input {
  width: 100%; background: var(--bg-input); border: 1.5px solid transparent;
  border-radius: var(--radius-pill); padding: 11px 16px;
  font-size: 15px; transition: 0.2s; color: var(--text-main);
}
.form-input:focus { border-color: var(--fb-blue); background: var(--bg-surface-solid); box-shadow: 0 0 0 3px var(--fb-blue-light); }
.form-input-box {
  width: 100%; background: var(--bg-input); border: 1.5px solid var(--divider);
  border-radius: var(--radius-sm); padding: 12px 16px;
  font-size: 15px; transition: 0.2s; color: var(--text-main);
}
.form-input-box:focus { border-color: var(--fb-blue); box-shadow: 0 0 0 3px var(--fb-blue-light); }
.form-label { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }

/* ══════════ AUTH PAGE ══════════ */
#auth-page-container {
  display: flex; min-height: 100vh; background: var(--bg-app);
  align-items: center; justify-content: center;
}
.auth-layout {
  display: grid; grid-template-columns: 1fr 400px; gap: 80px;
  max-width: 980px; width: 100%; padding: 0 24px; align-items: center;
}
.auth-left { display: flex; flex-direction: column; gap: 20px; }
.auth-brand { display: flex; align-items: center; gap: 16px; }
.auth-logo-mark {
  width: 64px; height: 64px; background: var(--fb-blue);
  border-radius: 18px; display: flex; align-items: center; justify-content: center;
  color: white; font-size: 34px; font-weight: 900;
}
.auth-brand-name { font-size: 42px; font-weight: 900; color: var(--fb-blue); letter-spacing: -1px; }
.auth-tagline { font-size: 22px; font-weight: 500; color: var(--text-muted); max-width: 380px; line-height: 1.4; }

.auth-card {
  background: var(--bg-surface-solid); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-float); padding: 32px; width: 100%;
}
.auth-card h2 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
.auth-card p { color: var(--text-muted); margin-bottom: 20px; font-size: 14px; }
.auth-divider { border: none; border-top: 1px solid var(--divider); margin: 20px 0; }
.auth-switch { text-align: center; font-size: 15px; margin-top: 16px; }

#login-view .input-group, #register-view .input-group { margin-bottom: 14px; }
#login-view .input-group label, #register-view .input-group label { font-size: 13px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 5px; }
#login-view .input-group input, #register-view .input-group input {
  width: 100%; background: var(--bg-input); border: 1.5px solid var(--divider);
  border-radius: var(--radius-sm); padding: 12px 16px; font-size: 15px; transition: 0.2s;
}
#login-view .input-group input:focus, #register-view .input-group input:focus { border-color: var(--fb-blue); box-shadow: 0 0 0 3px var(--fb-blue-light); }
.forgot-link { display: block; margin-top: 12px; font-size: 14px; }

/* ══════════ TOP NAVBAR ══════════ */
#top-navbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--navbar-h);
  background: var(--bg-surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 1000; gap: 8px;
}
.navbar-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; min-width: 280px; }
.navbar-logo {
  font-size: 32px; font-weight: 900; color: var(--fb-blue); letter-spacing: -1px;
  cursor: pointer; display: flex; align-items: center; gap: 6px; border: none; background: transparent; padding: 0;
}
.navbar-logo-mark {
  width: 40px; height: 40px; background: var(--fb-blue); border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 22px; font-weight: 900;
}
.navbar-search {
  background: var(--bg-input); border-radius: var(--radius-pill);
  display: flex; align-items: center; gap: 8px; padding: 0 12px;
  height: 40px; flex: 1; max-width: 240px; cursor: text;
}
.navbar-search input {
  background: transparent; border: none; outline: none; font-size: 15px;
  color: var(--text-main); width: 100%;
}
.navbar-search .search-icon { color: var(--text-muted); font-size: 16px; }

.navbar-center {
  display: flex; align-items: center; gap: 2px; flex: 1;
  justify-content: center; max-width: 640px;
}
.nav-tab {
  display: flex; align-items: center; justify-content: center;
  height: 48px; min-width: 96px; padding: 0 16px; cursor: pointer;
  border-bottom: 3px solid transparent; transition: 0.15s; border-radius: 0;
  position: relative; color: var(--text-muted); background: transparent;
  border-radius: var(--radius-sm); margin: 4px 0; font-size: 22px;
}
.nav-tab:hover { background: var(--bg-input); color: var(--text-main); }
.nav-tab.active { color: var(--fb-blue); }
.nav-tab .tab-dot { position: absolute; top: 6px; right: 8px; width: 8px; height: 8px; background: var(--fb-red); border-radius: 50%; }

.navbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; min-width: 280px; justify-content: flex-end; }
.navbar-right .icon-circle { background: var(--bg-input); position: relative; }
.navbar-right .icon-circle .badge { position: absolute; top: -2px; right: -2px; }
.navbar-avatar-btn { width: 40px; height: 40px; border-radius: var(--radius-circle); overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.15s; }
.navbar-avatar-btn:hover { border-color: var(--fb-blue); }
.navbar-avatar-btn img { width: 100%; height: 100%; object-fit: cover; }

/* ══════════ APP LAYOUT ══════════ */
#app-container {
  display: none;
  padding-top: var(--navbar-h);
  min-height: 100vh;
}
.app-columns {
  display: grid;
  grid-template-columns: var(--left-w) 1fr var(--right-w);
  max-width: 1600px;
  margin: 0 auto;
  gap: 0;
  min-height: calc(100vh - var(--navbar-h));
}

/* ══════════ LEFT SIDEBAR ══════════ */
.left-sidebar {
  position: sticky; top: var(--navbar-h); height: calc(100vh - var(--navbar-h));
  padding: 8px 8px 8px 0; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
}
.sidebar-profile-card {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s; border: none; background: transparent; text-align: left; width: 100%; color: inherit;
}
.sidebar-profile-card:hover { background: var(--bg-hover); }
.sidebar-profile-card img { width: 36px; height: 36px; }
.sidebar-profile-card .profile-name { font-weight: 700; font-size: 15px; }

.sidebar-nav-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s;
  font-weight: 600; font-size: 15px; color: var(--text-main); background: transparent;
  text-align: left; width: 100%; border: none;
}
.sidebar-nav-item:hover { background: var(--bg-hover); }
.sidebar-nav-item.active { background: var(--fb-blue-light); color: var(--fb-blue); }
.sidebar-nav-icon {
  width: 36px; height: 36px; border-radius: var(--radius-circle);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.sidebar-nav-item.active .sidebar-nav-icon { background: var(--fb-blue-light); }
.sidebar-nav-item:not(.active) .sidebar-nav-icon { background: var(--bg-input); }
.sidebar-section-title { font-size: 17px; font-weight: 800; padding: 8px 14px 4px; color: var(--text-main); }
.sidebar-divider { height: 1px; background: var(--divider); margin: 4px 14px; }
.sidebar-footer { padding: 12px 14px; font-size: 12px; color: var(--text-muted); }
.sidebar-footer a { cursor: pointer; }
.sidebar-footer a:hover { text-decoration: underline; }
.sidebar-badge-num {
  margin-left: auto; background: var(--fb-red); color: white;
  font-size: 12px; font-weight: 800; min-width: 20px; height: 20px;
  border-radius: var(--radius-pill); display: inline-flex; align-items: center; justify-content: center; padding: 0 5px;
}

/* ══════════ CENTER FEED ══════════ */
.center-feed { padding: 16px 16px 32px; max-width: 680px; margin: 0 auto; width: 100%; }

/* Stories */
.stories-row {
  display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px;
  scrollbar-width: none;
}
.stories-row::-webkit-scrollbar { display: none; }
.story-card {
  position: relative; width: 112px; height: 196px; flex-shrink: 0; border-radius: var(--radius-md);
  overflow: hidden; cursor: pointer; transition: transform 0.15s;
  box-shadow: var(--shadow-sm); border: none; padding: 0; text-align: left;
}
.story-card:hover { transform: scale(1.02); }
.story-card img { width: 100%; height: 100%; object-fit: cover; }
.story-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 40%, rgba(0,0,0,0.6) 100%); }
.story-avatar-ring {
  position: absolute; top: 10px; left: 10px; width: 40px; height: 40px;
  border-radius: var(--radius-circle); border: 3px solid var(--fb-blue);
  overflow: hidden; box-shadow: var(--shadow-sm);
}
.story-avatar-ring img { width: 100%; height: 100%; object-fit: cover; }
.story-name { position: absolute; bottom: 10px; left: 8px; right: 8px; font-weight: 700; font-size: 13px; color: white; line-height: 1.2; }
.story-add-card {
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  padding-bottom: 16px; background: var(--bg-surface-solid);
}
.story-add-btn {
  width: 40px; height: 40px; background: var(--fb-blue); border-radius: var(--radius-circle);
  display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: 300;
  border: 3px solid var(--bg-surface-solid); margin-bottom: 8px; position: absolute; bottom: 46px;
}
.story-add-label { font-weight: 700; font-size: 13px; color: var(--text-main); text-align: center; }

/* Create Post Card */
.create-post-card { padding: 12px 16px; margin-bottom: 16px; }
.create-post-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.create-post-btn {
  flex: 1; background: var(--bg-input); border: 1.5px solid var(--divider);
  border-radius: var(--radius-pill); padding: 11px 16px; text-align: left;
  font-size: 15px; color: var(--text-muted); cursor: pointer; font-weight: 600; transition: background 0.15s;
}
.create-post-btn:hover { background: var(--divider); }
.post-media-btns { display: flex; border-top: 1px solid var(--divider); padding-top: 4px; }
.post-media-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; border: none;
  padding: 8px; border-radius: var(--radius-md); cursor: pointer; font-weight: 700; font-size: 14px;
  color: var(--text-muted); background: transparent; transition: background 0.15s;
}
.post-media-btn:hover { background: var(--bg-hover); color: var(--text-main); }
.post-media-btn .icon { font-size: 18px; }

/* Post Card */
.post-card { margin-bottom: 16px; overflow: visible; position: relative; }
.post-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 16px 16px 0; margin-bottom: 12px; }
.post-author-info { display: flex; gap: 10px; align-items: center; }
.post-author-info img { width: 40px; height: 40px; cursor: pointer; }
.post-author-name { font-weight: 700; font-size: 15px; cursor: pointer; }
.post-author-name:hover { text-decoration: underline; }
.post-time { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
.post-options-btn { padding: 6px; border-radius: var(--radius-circle); border: none; cursor: pointer; background: transparent; font-size: 20px; color: var(--text-muted); transition: background 0.15s; }
.post-options-btn:hover { background: var(--bg-hover); }
.post-body { padding: 0 16px 12px; font-size: 16px; line-height: 1.6; }
.post-body.large-text { font-size: 22px; font-weight: 600; }
.post-image { width: 100%; cursor: zoom-in; border-radius: 0; }
.post-image:hover { opacity: 0.96; }

/* Reaction Summary Bar */
.reaction-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; color: var(--text-muted); font-size: 14px; }
.reaction-icons { display: flex; align-items: center; gap: 2px; }
.reaction-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1.5px solid var(--bg-surface-solid); margin-left: -4px; }
.reaction-dot:first-child { margin-left: 0; }
.reaction-bar-count, .reaction-bar-comments { cursor: pointer; font-weight: 600; background: none; border: none; font: inherit; color: inherit; }
.reaction-bar-count:hover, .reaction-bar-comments:hover { text-decoration: underline; }

/* Post Action Buttons */
.post-actions { display: flex; border-top: 1px solid var(--divider); padding: 4px 8px; }
.post-action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; border: none;
  padding: 8px; border-radius: var(--radius-md); cursor: pointer; font-weight: 700; font-size: 15px;
  color: var(--text-muted); background: transparent; transition: background 0.15s; position: relative;
}
.post-action-btn:hover { background: var(--bg-hover); color: var(--text-main); }
.post-action-btn.reacted { color: var(--fb-blue); }
.action-icon { font-size: 18px; }

/* Reaction Picker */
.reaction-picker {
  position: absolute; bottom: calc(100% + 8px); left: -8px;
  background: var(--bg-surface-solid); border-radius: var(--radius-pill);
  box-shadow: var(--shadow-float); padding: 8px 12px;
  display: flex; gap: 4px; z-index: 100; opacity: 0; pointer-events: none;
  transform: scale(0.8) translateY(8px); transform-origin: bottom left;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.post-action-btn:hover .reaction-picker,
.reaction-picker.visible {
  opacity: 1; pointer-events: auto; transform: scale(1) translateY(0);
}
.reaction-emoji {
  font-size: 28px; cursor: pointer; border-radius: 50%; border: none; background: transparent;
  padding: 4px; transition: transform 0.15s; display: flex; align-items: center; justify-content: center;
  position: relative;
}
.reaction-emoji:hover { transform: scale(1.4) translateY(-6px); }
.reaction-emoji .reaction-label {
  position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
  font-size: 11px; font-weight: 700; white-space: nowrap; background: rgba(0,0,0,0.8);
  color: white; padding: 2px 6px; border-radius: 4px; pointer-events: none; opacity: 0; transition: 0.15s;
}
.reaction-emoji:hover .reaction-label { opacity: 1; }

/* Comments */
.comments-section { padding: 0 16px 8px; border-top: 1px solid var(--divider); padding-top: 8px; }
.comment-item { display: flex; gap: 8px; margin-bottom: 10px; }
.comment-item img { width: 32px; height: 32px; flex-shrink: 0; }
.comment-bubble { background: var(--bg-input); border-radius: var(--radius-md); padding: 8px 12px; flex: 1; }
.comment-bubble .comment-author { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.comment-bubble .comment-text { font-size: 14px; line-height: 1.4; }
.comment-meta { display: flex; gap: 16px; padding-left: 4px; margin-top: 4px; font-size: 12px; font-weight: 700; color: var(--text-muted); }
.comment-meta button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; padding: 0; }
.comment-meta button:hover { text-decoration: underline; }
.comment-input-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; padding-top: 8px; }
.comment-input { flex: 1; background: var(--bg-input); border: none; border-radius: var(--radius-pill); padding: 9px 16px; font-size: 14px; }
.comment-input:focus { outline: none; box-shadow: 0 0 0 2px var(--fb-blue-light); }

/* ══════════ MODALS ══════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(2px);
  display: none; align-items: center; justify-content: center; z-index: 2000;
}
.modal-overlay.active { display: flex; animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box {
  background: var(--bg-surface-solid); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-float); width: 100%; max-width: 548px;
  max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
  animation: scaleIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes scaleIn { from { transform: scale(0.92); opacity: 0.5; } to { transform: scale(1); opacity: 1; } }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; border-bottom: 1px solid var(--divider);
}
.modal-title { font-size: 20px; font-weight: 800; flex: 1; text-align: center; margin: 0; }
.modal-close { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-input); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: background 0.15s; border: none; }
.modal-close:hover { background: var(--divider); }
.modal-body { padding: 16px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px; border-top: 1px solid var(--divider); }

/* Composer Modal */
.composer-author { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.composer-author img { width: 40px; height: 40px; }
.composer-privacy { display: flex; align-items: center; gap: 4px; background: var(--bg-input); padding: 3px 10px 3px 8px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 700; color: var(--text-main); border: none; }
.composer-textarea { width: 100%; min-height: 120px; border: none; outline: none; resize: none; font-size: 20px; background: transparent; color: var(--text-main); font-family: inherit; }
.composer-media-actions { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border: 1px solid var(--divider); border-radius: var(--radius-sm); margin-top: 12px; }

/* ══════════ RIGHT SIDEBAR ══════════ */
.right-sidebar {
  position: sticky; top: var(--navbar-h); height: calc(100vh - var(--navbar-h));
  padding: 16px 0 16px 0; overflow-y: auto;
}
.right-sidebar-section { padding: 0 8px; margin-bottom: 20px; }
.right-sidebar-title { font-size: 17px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; padding: 0 6px; }

/* Responsive */
@media (max-width: 1200px) { :root { --right-w: 280px; --left-w: 280px; } }
@media (max-width: 1024px) {
  .right-sidebar { display: none; }
  .app-columns { grid-template-columns: 72px 1fr; }
  .left-sidebar { width: 72px; align-items: center; padding: 8px 4px; }
  .sidebar-profile-card .profile-name, .sidebar-nav-item span:last-child, .sidebar-section-title, .sidebar-footer, .sidebar-divider { display: none; }
}
@media (max-width: 768px) {
  .app-columns { grid-template-columns: 1fr; }
  .left-sidebar { display: none; }
  .mobile-bottom-nav { display: block; }
  .center-feed { padding: 12px 0 80px; }
}
</style>
</head>

            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Email address" required autocomplete="email">
          </div>
          <div class="input-group">
            <label for="login-pass">Password</label>

        </form>

        <hr class="auth-divider">
        <div style="text-align:center;">
          <button type="button" class="btn" style="background:#42B72A; color:#fff; font-size:17px; padding:14px 28px; border-radius:var(--radius-sm);" onclick="toggleAuth()">Create new account</button>

      <!-- Register Card -->

        <h2 style="font-size:26px; font-weight:900;">Create a new account</h2>

          <div class="input-group"><label for="reg-pass">New password</label><input type="password" id="reg-pass" placeholder="New password" required minlength="6" autocomplete="new-password"></div>

<!-- ════════════ NEW FEATURES INLINE SCRIPT ════════════ -->
<script id="new-features-script">
// This script bridges the UI with the Pandas/NumPy Data Science Endpoint without modifying your core app.js

/**
 * FEATURE: Trending / Recent Data Science Feed Toggle
 * Connects to the /api/analytics/trending Pandas & NumPy endpoint
 */
function uiToggleFeed(feedType) {
    const btnRecent = document.getElementById('btn-feed-recent');
    const btnTrending = document.getElementById('btn-feed-trending');

    // Update UI styling for toggle buttons
    if (feedType === 'recent') {
        btnRecent.style.background = 'var(--bg-surface-solid)';
        btnRecent.style.color = 'var(--text-main)';
        btnRecent.style.boxShadow = 'var(--shadow-sm)';
        
        btnTrending.style.background = 'transparent';
        btnTrending.style.color = 'var(--text-muted)';
        btnTrending.style.boxShadow = 'none';
        
        // Let app.js fetch the standard feed (usually via a fetchState() or similar)
        if (typeof window.fetchState === 'function') {
            window.fetchState();
        } else {
            showToast("Switched to Recent chronological feed.");
            setTimeout(() => location.reload(), 500); // fallback
        }
    } else if (feedType === 'trending') {
        btnTrending.style.background = 'var(--bg-surface-solid)';
        btnTrending.style.color = 'var(--text-main)';
        btnTrending.style.boxShadow = 'var(--shadow-sm)';
        
        btnRecent.style.background = 'transparent';
        btnRecent.style.color = 'var(--text-muted)';
        btnRecent.style.boxShadow = 'none';

        showToast("🔥 Loading Algorithmic Trending Feed...");
        fetchTrendingFeed();
    }
}

async function fetchTrendingFeed() {
    try {
        let res = await fetch('/api/analytics/trending');
        if(!res.ok) throw new Error("Failed to fetch trending posts");
        
        let data = await res.json();
        if (data.status === 'ok') {
            renderTrendingData(data.trending);
        }
    } catch (e) {
        console.error(e);
        showToast("Error loading trending feed.");
    }
}

function renderTrendingData(trendingPosts) {
    const container = document.getElementById('feed-container');
    container.innerHTML = `
      <div style="background: linear-gradient(135deg, var(--fb-purple), var(--fb-blue)); color: white; padding: 12px; border-radius: var(--radius-md); margin-bottom: 16px; font-weight: bold; text-align: center; box-shadow: var(--shadow-sm);">
        🚀 Now viewing the Algorithmic Trending Feed (Powered by Pandas & NumPy)
      </div>
    `;

    if (!trendingPosts || trendingPosts.length === 0) {
        container.innerHTML += `<div style="text-align:center; padding: 20px; color: var(--text-muted);">No trending data available yet.</div>`;
        return;
    }

    // Since we don't want to duplicate the massive render code from app.js, 
    // we build a lightweight visually matched representation of the trending stats.
    trendingPosts.forEach((post, index) => {
        let score = (post.trending_score || 0).toFixed(2);
        
        let html = `
        <div class="surface post-card" style="margin-bottom: 16px; padding-bottom: 12px; border-left: 4px solid var(--fb-purple);">
            <div style="padding: 12px 16px; font-size: 18px; font-weight: 800; color: var(--fb-purple); border-bottom: 1px solid var(--divider);">
               #${index + 1} Trending 🔥 (Score: ${score})
            </div>
            <div class="post-header" style="padding-top: 12px;">
              <div class="post-author-info">
                 <div class="post-author-name">Post ID: ${post.post_id}</div>
                 <div class="post-time">${post.created_at || 'Recently'}</div>
              </div>
            </div>
            <div class="post-body" style="font-style: italic; color: var(--text-muted);">
               (Algorithmic Preview Mode) This post is currently trending high based on the NumPy engagement calculation!
            </div>
            <div class="reaction-bar" style="border-top: 1px solid var(--divider); margin-top: 8px;">
               <div class="reaction-icons">
                 <span class="reaction-dot" style="background:var(--fb-blue); color:white;">👍</span>
                 <span style="margin-left:6px; font-weight:bold;">${post.likes_count} Likes</span>
               </div>
               <div class="reaction-bar-comments">${post.comments_count} Comments</div>
            </div>
        </div>`;
        container.innerHTML += html;
    });
}
</script>
