<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QualityGroup - Operations & Assurance Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0A0F1C;
            color: #EAEFF8;
            line-height: 1.6;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .qgspin {
            animation: spin 1s linear infinite;
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse 900px 600px at 50% -10%, #16213A 0%, #0A0F1C 60%);
            padding: 20px;
        }

        .auth-box {
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            width: 52px;
            height: 52px;
            margin: 0 auto 14px;
            border-radius: 12px;
            background: #16213A;
            border: 1px solid rgba(232,163,61,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 26px;
            margin: 0;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .amber { color: #E8A33D; }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            color: #8B98B4;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .panel {
            background: #111A2E;
            border: 1px solid rgba(232,163,61,0.14);
            border-radius: 14px;
            padding: 26px;
            position: relative;
            margin-bottom: 16px;
        }

        .corner-ticks {
            position: absolute;
            width: 7px;
            height: 7px;
            border-color: rgba(232,163,61,0.35);
        }

        .corner-ticks-tl {
            top: 6px;
            left: 6px;
            border-top: 1.5px solid;
            border-left: 1.5px solid;
        }

        .corner-ticks-tr {
            top: 6px;
            right: 6px;
            border-top: 1.5px solid;
            border-right: 1.5px solid;
        }

        .corner-ticks-bl {
            bottom: 6px;
            left: 6px;
            border-bottom: 1.5px solid;
            border-left: 1.5px solid;
        }

        .corner-ticks-br {
            bottom: 6px;
            right: 6px;
            border-bottom: 1.5px solid;
            border-right: 1.5px solid;
        }

        .mode-tabs {
            display: flex;
            gap: 4px;
            background: #0B1324;
            border-radius: 9px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .mode-tab {
            flex: 1;
            padding: 9px 0;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: transparent;
            color: #8B98B4;
            font-weight: 700;
        }

        .mode-tab.active {
            background: #E8A33D;
            color: #1A1305;
        }

        .form-group {
            display: block;
            margin-bottom: 14px;
        }

        .form-label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8B98B4;
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            background: #0B1324;
            border: 1px solid rgba(232,163,61,0.14);
            border-radius: 8px;
            padding: 10px 12px;
            color: #EAEFF8;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            border-color: rgba(232,163,61,0.4);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .alert {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 14px;
            font-size: 11.5px;
            line-height: 1.5;
        }

        .alert-warning {
            background: rgba(232,163,61,0.16);
            border: 1px solid rgba(232,163,61,0.35);
            color: #FFC968;
        }

        .alert-error {
            background: rgba(242,96,74,0.16);
            border: 1px solid rgba(242,96,74,0.33);
            color: #F2604A;
        }

        .alert-icon {
            flex-shrink: 0;
            margin-top: 1px;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13px;
            border-radius: 8px;
            padding: 10px 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid transparent;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary {
            background: #E8A33D;
            color: #1A1305;
            border: 1px solid #E8A33D;
        }

        .btn-primary:hover:not(:disabled) {
            filter: brightness(1.15);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: rgba(87, 98, 128, 0.5);
            margin-top: 16px;
            line-height: 1.6;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 9px;
            background: none;
            border: none;
            color: #8B98B4;
            cursor: pointer;
            padding: 4px;
        }

        .password-wrapper {
            position: relative;
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <!-- Header -->
            <div class="header">
                <div class="logo">🛡️</div>
                <h1>Quality<span class="amber">Group</span></h1>
                <p class="subtitle">Operations &amp; Assurance Console</p>
            </div>

            <!-- Auth Panel -->
            <div class="panel">
                <div class="corner-ticks corner-ticks-tl"></div>
                <div class="corner-ticks corner-ticks-tr"></div>
                <div class="corner-ticks corner-ticks-bl"></div>
                <div class="corner-ticks corner-ticks-br"></div>

                <!-- Mode Tabs -->
                <div class="mode-tabs">
                    <button class="mode-tab active" id="loginTab" onclick="switchMode('login')">Sign in</button>
                    <button class="mode-tab" id="signupTab" onclick="switchMode('signup')">Register</button>
                </div>

                <!-- Form -->
                <form id="authForm" onsubmit="handleSubmit(event)">
                    <!-- Signup Fields -->
                    <div id="signupFields" style="display: none;">
                        <div class="form-group">
                            <label class="form-label">Full name</label>
                            <input type="text" id="fullName" placeholder="Juan Dela Cruz">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Department</label>
                            <select id="department">
                                <option>MS-Design</option>
                                <option>FNTRL</option>
                                <option>H2S</option>
                                <option>Limestone</option>
                                <option>DCS Control</option>
                                <option>Logistics</option>
                                <option>Quality Assurance</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" id="email" placeholder="you@qualitygroup.com">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Phone</label>
                                <input type="tel" id="phone" placeholder="09xx xxx xxxx">
                            </div>
                        </div>

                        <div class="alert alert-warning">
                            <span class="alert-icon">👑</span>
                            <p>First account on this console — you'll be registered as Administrator.</p>
                        </div>
                    </div>

                    <!-- Common Fields -->
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="username" placeholder="j.delacruz" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
                        </div>
                    </div>

                    <!-- Error Alert -->
                    <div id="errorAlert" class="alert alert-error" style="display: none;">
                        <span class="alert-icon">⚠️</span>
                        <p id="errorMsg"></p>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span id="btnText">Sign in</span>
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <p class="footer-text">
                Prototype credentials store in shared artifact storage — visible to everyone using this app. Do not use a real password.
            </p>
        </div>
    </div>

    <script>
        let currentMode = 'login';

        function switchMode(mode) {
            currentMode = mode;
            const signupFields = document.getElementById('signupFields');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const btnText = document.getElementById('btnText');

            if (mode === 'signup') {
                signupFields.style.display = 'block';
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
                btnText.textContent = 'Create account';
            } else {
                signupFields.style.display = 'none';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                btnText.textContent = 'Sign in';
            }
            document.getElementById('errorAlert').style.display = 'none';
        }

        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function handleSubmit(event) {
            event.preventDefault();
            const errorAlert = document.getElementById('errorAlert');
            const errorMsg = document.getElementById('errorMsg');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorMsg.textContent = 'Username and password are required.';
                errorAlert.style.display = 'flex';
                return;
            }

            if (currentMode === 'signup') {
                const fullName = document.getElementById('fullName').value.trim();
                const email = document.getElementById('email').value.trim();

                if (!fullName) {
                    errorMsg.textContent = 'Full name is required.';
                    errorAlert.style.display = 'flex';
                    return;
                }

                console.log('Signup Data:', {
                    fullName,
                    username,
                    password,
                    email,
                    phone: document.getElementById('phone').value,
                    department: document.getElementById('department').value
                });
                alert('✅ Account registered! (Check console for details)');
            } else {
                console.log('Login Data:', { username, password });
                alert('✅ Login successful! (Check console for details)');
            }

            errorAlert.style.display = 'none';
        }
    </script>
</body>
</html>
